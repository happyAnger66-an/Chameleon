# pi05 with REAL openpi weights (not the reference surrogate).
#
# Requires: the openpi runtime importable, transformers_replace installed, and a
# checkpoint. Set use_reference=false and point checkpoint at a .pt/.pth/.safetensors.
#
# Status: real-weight LOADING + per-submodule quantize are supported, and real
# end-to-end PyTorch inference now works via Pi05RealOrchestrator (it calls
# PI0Pytorch.sample_actions directly; set actions to include `infer`). Compiling
# the real model to a TRT engine (ONNX QDQ export) is still a bring-up TODO, so
# `use_compiled_engines` must stay false for real weights.

architecture: pi05
model: pi05
platform: nvidia_orin
output_dir: output/pi05_realweights

actions:
  - quantize

model_overrides:
  use_reference: false
  checkpoint: /path/to/pi05_checkpoint.pt
  action_dim: 32
  action_horizon: 50
  paligemma_variant: gemma_2b
  action_expert_variant: gemma_300m

quantize:
  - stage: action_expert
    method: fp8
    weight_dtype: fp8
    kv_cache_dtype: fp8
