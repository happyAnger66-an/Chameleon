# pi05 LIBERO — vit(TRT) + LLM prefill/denoise(TVM, mlc-vla M1) 推理 vs ground-truth。
#
# SigLIP vit 复用 TRT engine；PaliGemma 前缀 prefill（expert-0 KV 固化）与 suffix-only
# denoise（默认图内 denoise_loop_kv，10 步）换成 mlc-vla 编译的 TVM engine。
# 预测动作与 LeRobot 真值对比。可与 pi05_libero_trt_eval.yaml / pi05_libero_eval.yaml
# 的误差横向对比（TVM vs TRT vs PT）；双路对比见 pi05_libero_tvm_compare.yaml。
#
# 前置条件：
#   1. vit TRT engine 已 build（output/pi05_libero_trt/engines/vit.engine）
#   2. openpi 3.11 venv + 系统 Python 3.12（tvm / mlc-vla）
#
# 启动：
#   export TVM_HOME=/home/zhangxa/codes/edgeLLM/tvm
#   export MLC_VLA_HOME=/home/zhangxa/codes/edgeLLM/mlc-vla
#   export MLC_VLA_PY=/usr/bin/python3.12
#   export TVM_LIBRARY_PATH=$TVM_HOME/build/lib
#   PYTHONPATH=. models/openpi/.venv/bin/python -m chameleon.cli eval \
#       --config configs/pi05_libero_tvm_eval.yaml

architecture: pi05
model: pi05
platform: nvidia_ada
output_dir: output/pi05_libero_tvm_eval

actions:
  - eval

model_overrides:
  use_reference: false
  checkpoint: models/openpi/pytorch/model.safetensors
  action_dim: 32
  action_horizon: 10
  paligemma_variant: gemma_2b
  action_expert_variant: gemma_300m
  precision: bfloat16
  # fp16 优于 bf16：bf16 尾数仅 7 位且 TVM/dlight 的 bf16 GEMM 累加精度低于 TRT 的 fp32 累加，
  # 10 步 Euler + 18 层 prefill 累积后 max_abs 0.176。fp16(尾数 10 位) 降到 0.079(逼近 TRT 0.070)，且更快。
  tvm_dtype: float16
  # 图内整段 Euler 环（denoise_loop_kv），消除每步 host↔device / 跨进程 IPC
  tvm_loop: true
  # 整段去噪环 CUDA Graph（需 tvm_loop=true）；首次编译较慢，稳态更快
  tvm_cuda_graph: true

deploy:
  backend: pi05
  checkpoint_dir: models/openpi/pytorch
  train_config: pi05_libero
  export_dir: output/pi05_libero_trt/onnx
  engine_dir: output/pi05_libero_trt/engines

infer:
  num_steps: 10
  torch_device: cuda

data:
  dataset: pi05_libero
  openpi_config: pi05_libero
  # repo_id 留空时从 openpi pi05_libero DataConfig 读取 physical-intelligence/libero
  # dataset_root: /root/.cache/huggingface/lerobot/physical-intelligence/libero
  start_index: 0
  num_samples: 20

evaluate:
  checkpoint_dir: models/openpi/pytorch
  norm_stats_dir: ~/.cache/openpi/openpi-assets/checkpoints/pi05_libero/assets
  asset_id: physical-intelligence/libero
  policy_runner: tvm_only
  compare_mode: false
  engine_dir: output/pi05_libero_trt/engines
  noise: fixed
  noise_seed: 0
  precision: bf16
  trt_cuda_graph: false
  num_samples: 10
  stride: 1
  compare_horizon: null
  device: cuda
  pytorch_load_device: cpu
  viewer: none
