# pi05 LIBERO — TensorRT engine vs PyTorch 浮点双路对比 + WebUI 可视化。
#
# 前置条件：
#   1. 已构建 TRT engine（与 configs/pi05_libero_trt_deploy.yaml 相同产物）：
#        PYTHONPATH=. models/openpi/.venv/bin/python -m chameleon.cli workflow \
#            --config configs/pi05_libero_trt_deploy.yaml
#      engine 默认在 output/pi05_libero_trt/engines/{vit,llm,expert,denoise}.engine
#   2. openpi 环境 + TensorRT（Chameleon 内置 TRT runtime）
#
# 启动评测 + WebUI：
#   PYTHONPATH=. models/openpi/.venv/bin/python -m chameleon.cli eval \
#       --config configs/pi05_libero_trt_compare.yaml
#
# 浏览器（另开终端）：
#   cd chameleon/evaluate/webui_client && python -m http.server 8080 --bind 0.0.0.0
#   本机：http://127.0.0.1:8080  远程：http://<服务器IP>:8080
#   WebSocket：ws://<服务器IP>:8766/ws（见 evaluate.webui_client_ws_url）

architecture: pi05
model: pi05
platform: nvidia_ada
output_dir: output/pi05_libero_trt_compare

actions:
  - eval

model_overrides:
  use_reference: false
  checkpoint: models/openpi/pytorch/model.safetensors
  action_dim: 32
  action_horizon: 10
  paligemma_variant: gemma_2b
  action_expert_variant: gemma_300m
  precision: bfloat16

deploy:
  backend: pi05
  checkpoint_dir: models/openpi/pytorch
  train_config: pi05_libero
  export_dir: output/pi05_libero_trt/onnx
  engine_dir: output/pi05_libero_trt/engines

infer:
  num_steps: 10
  torch_device: cuda

data:
  dataset: pi05_libero
  openpi_config: pi05_libero
  # repo_id 留空时自动从 openpi pi05_libero DataConfig 读取 physical-intelligence/libero
  # （与 model_optimizer lerobot_eval_webui 一致，不在 YAML 里写占位符）。
  # 若数据已下载到本地 HF 缓存，可指定 dataset_root 避免联网：
  # dataset_root: ~/.cache/huggingface/lerobot/physical-intelligence/libero
  start_index: 0
  num_samples: 20

evaluate:
  checkpoint_dir: models/openpi/pytorch
  norm_stats_dir: ~/.cache/openpi/openpi-assets/checkpoints/pi05_libero/assets
  asset_id: physical-intelligence/libero
  policy_runner: pt_trt_compare
  compare_mode: true
  engine_dir: output/pi05_libero_trt/engines
  noise: fixed
  noise_seed: 0
  precision: bf16
  trt_cuda_graph: false
  num_samples: 20
  stride: 10
  compare_horizon: null
  device: cuda
  pytorch_load_device: cpu
  viewer: both
  webui_host: 0.0.0.0          # 监听所有网卡，允许远程连 WebSocket
  # webui_client_ws_url: ws://YOUR_SERVER_IP:8766/ws  # 远程访问时取消注释并改 IP
  webui_port: 8766
  webui_path: /ws
  webui_history_size: 200
  webui_show_wrist: true
