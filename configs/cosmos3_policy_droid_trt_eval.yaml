# Cosmos3-Nano-Policy-DROID — TRT-only 策略推理评测（host diffusers + TRT engine）。
#
# 前置：先用 configs/cosmos3_policy_droid_trt_deploy.yaml 完成 export + compile，
# 生成 4 个 engine 到 output/cosmos3_policy_droid_trt/engines。
# 运行：
#   PYTHONPATH=. python -m chameleon.cli eval --config configs/cosmos3_policy_droid_trt_eval.yaml

architecture: cosmos3
model: cosmos3_nano
platform: nvidia_ada
output_dir: output/cosmos3_policy_droid_trt

actions:
  - eval

model_overrides:
  use_reference: false
  model_id: nvidia/Cosmos3-Nano-Policy-DROID
  precision: bfloat16
  mode: action
  trt_profile: policy_droid

generate:
  mode: action
  prompt: "Pick up the object and place it at the target location."
  guidance_scale: 1.0
  action:
    mode: policy
    chunk_size: 16
    domain_name: droid_lerobot
    resolution_tier: 480
    view_point: ego_view

deploy:
  backend: cosmos3
  engine_dir: output/cosmos3_policy_droid_trt/engines

# 真实数据集：DROID RLDS（droid_100）。dataset_root 指向 tfds data_dir，即
# `gsutil cp gs://gresearch/robotics/droid_100 <dir>/droid_100` 后的 <dir>。
# 需要 tensorflow + tensorflow_datasets（见 dataloader/cosmos3_droid.py）。
data:
  dataset: cosmos3_droid
  dataset_root: ~/robot/datasets
  start_index: 0
  num_samples: 32

evaluate:
  policy_runner: cosmos3_trt_only
  compare_mode: false
  # 评测 + WebUI 可视化（console + web）。浏览器打开 chameleon/evaluate/webui_client。
  viewer: both
  num_samples: 32
  webui_host: 0.0.0.0
  webui_port: 8000

infer:
  batch_size: 1
  num_steps: 30
  torch_device: cuda
