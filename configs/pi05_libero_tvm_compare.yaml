# pi05 LIBERO — PyTorch 浮点 vs TVM(mlc-vla M1) 双路对比 + WebUI。
#
# vit 复用 TRT engine；LLM prefill + denoise 走 mlc-vla（图内 denoise_loop_kv）。
# 两路共用 fixed noise，WebUI 显示 pred_pt / pred_tvm 及 PT−TVM 差异。
#
# 显存：默认 PT 在 CPU（model_overrides.pt_device / evaluate.pytorch_load_device），
# GPU 留给 vit+TVM。显存充足时可设 pt_device: cuda（同卡有 OOM 风险）。
#
# 前置条件：
#   1. vit TRT engine 已 build（output/pi05_libero_trt/engines/vit.engine）
#   2. openpi 3.11 venv + 系统 Python 3.12（tvm / mlc-vla）
#
# 启动：
#   export TVM_HOME=/home/zhangxa/codes/edgeLLM/tvm
#   export MLC_VLA_HOME=/home/zhangxa/codes/edgeLLM/mlc-vla
#   export MLC_VLA_PY=/usr/bin/python3.12
#   export TVM_LIBRARY_PATH=$TVM_HOME/build/lib
#   PYTHONPATH=. models/openpi/.venv/bin/python -m chameleon.cli eval \
#       --config configs/pi05_libero_tvm_compare.yaml
#
# WebUI（另开终端）：
#   cd chameleon/evaluate/webui_client && python -m http.server 8080 --bind 0.0.0.0

architecture: pi05
model: pi05
platform: nvidia_ada
output_dir: output/pi05_libero_tvm_compare

actions:
  - eval

model_overrides:
  use_reference: false
  checkpoint: models/openpi/pytorch/model.safetensors
  action_dim: 32
  action_horizon: 10
  paligemma_variant: gemma_2b
  action_expert_variant: gemma_300m
  precision: bfloat16
  # fp16：精度逼近 TRT，且快于 bf16（见 mlc-vla/docs/M1.md）
  tvm_dtype: float16
  # 图内整段 Euler 环（消除每步 host↔device / IPC）
  tvm_loop: true
  # compare 双路同卡时 runner 会强制关闭；单路 tvm_only 可开
  tvm_cuda_graph: false
  # PT 路设备（默认 cpu，避免与 TVM 抢显存；显存够可改 cuda）
  pt_device: cuda

deploy:
  backend: pi05
  checkpoint_dir: models/openpi/pytorch
  train_config: pi05_libero
  export_dir: output/pi05_libero_trt/onnx
  engine_dir: output/pi05_libero_trt/engines

infer:
  num_steps: 10
  torch_device: cuda

data:
  dataset: pi05_libero
  openpi_config: pi05_libero
  # repo_id 留空时从 openpi pi05_libero DataConfig 读取 physical-intelligence/libero
  # dataset_root: /root/.cache/huggingface/lerobot/physical-intelligence/libero
  start_index: 0
  num_samples: 20

evaluate:
  checkpoint_dir: models/openpi/pytorch
  norm_stats_dir: ~/.cache/openpi/openpi-assets/checkpoints/pi05_libero/assets
  asset_id: physical-intelligence/libero
  policy_runner: pt_tvm_compare
  compare_mode: true
  engine_dir: output/pi05_libero_trt/engines
  noise: fixed
  noise_seed: 0
  precision: bf16
  trt_cuda_graph: false
  num_samples: 10
  stride: 1
  compare_horizon: null
  device: cuda
  # 未设 model_overrides.pt_device 时，PT 路回退到此（默认 cpu）
  pytorch_load_device: cpu
  viewer: both
  webui_host: 0.0.0.0
  webui_port: 8768
  webui_path: /ws
  webui_history_size: 200
  webui_show_wrist: true
