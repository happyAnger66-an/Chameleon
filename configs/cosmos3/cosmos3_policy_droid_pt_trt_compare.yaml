# Cosmos3-Nano-Policy-DROID — PyTorch 浮点 vs TensorRT engine 双路对比。
#
# 前置：先完成 export + compile（configs/cosmos3_policy_droid_trt_deploy.yaml）。
# 运行：
#   PYTHONPATH=. python -m chameleon.cli eval --config configs/cosmos3_policy_droid_pt_trt_compare.yaml
#
# 报告 PT vs TRT action 的 max/mean diff（允许 bf16 误差）。

architecture: cosmos3
model: cosmos3_nano
platform: nvidia_ada
output_dir: output/cosmos3_policy_droid_trt

actions:
  - eval

model_overrides:
  use_reference: false
  model_id: nvidia/Cosmos3-Nano-Policy-DROID
  precision: bfloat16
  mode: action
  trt_profile: policy_droid

generate:
  mode: action
  prompt: "Pick up the object and place it at the target location."
  guidance_scale: 1.0
  action:
    mode: policy
    chunk_size: 16
    domain_name: droid_lerobot
    resolution_tier: 480
    view_point: ego_view

deploy:
  backend: cosmos3
  engine_dir: output/cosmos3_policy_droid_trt/engines

evaluate:
  policy_runner: cosmos3_pt_trt_compare
  compare_mode: true
  noise: fixed
  noise_seed: 0

infer:
  batch_size: 1
  num_steps: 30
  torch_device: cuda
